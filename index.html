<script>
// LOGIN
function login(){
  let user = document.getElementById("username").value;
  if(!user){ alert("Enter username"); return; }
  localStorage.setItem("user", user);
  document.getElementById("welcome").innerText = "Welcome " + user;
  generateRef();
}

// WALLET
let balance = parseInt(localStorage.getItem("wallet")) || 0;
document.getElementById("wallet").innerText = balance;

function addMoney(amount){
  balance += amount;
  localStorage.setItem("wallet", balance);
  document.getElementById("wallet").innerText = balance;
}

// REFERRAL
function generateRef(){
  let user = localStorage.getItem("user");
  if(user){
    let link = window.location.origin + window.location.pathname + "?ref=" + user;
    document.getElementById("refLink").innerText = link;
  }
}

// URL REF CHECK
let urlParams = new URLSearchParams(window.location.search);
let ref = urlParams.get('ref');
if(ref){
  localStorage.setItem("referral", ref);
}

// SHARE
function shareApp(){
  let url = document.getElementById("refLink").innerText;
  let text = "🔥 Earn Money Daily 💰\nJoin Fast👇\n" + url;
  if(navigator.share){
    navigator.share({text:text});
  } else {
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
  }
}

// WITHDRAW
function withdraw(){
  let upi = document.getElementById("upi").value;
  if(!upi){ alert("Enter UPI ID"); return; }
  alert("Request Sent! Screenshot Telegram par bhejo");
}

// TASK BUTTON
function showTasks(){
  let taskDiv = document.getElementById("tasksList");
  if(taskDiv.style.display === "none"){
    taskDiv.style.display = "block";
    taskDiv.scrollIntoView({behavior:"smooth"});
  } else {
    taskDiv.style.display = "none";
  }
}
</script>
